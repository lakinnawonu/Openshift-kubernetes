apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: larry-argo-config
  namespace: argocd
spec:
  destination:
    server:
    namespace:
  project: default
  revisionHistoryLimit:
  source:
    repoURL:
    targetRevision: HEAD
    path:
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreatNamespace=true
