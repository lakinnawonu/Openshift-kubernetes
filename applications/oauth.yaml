apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  annotations:
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/create-only: "true"
  name: cluster
spec:
  identityProviders:
  - htpasswd:
      fileData:
        name: htpass-secret
    mappingMethod: claim
    name: developer
    type: HTPasswd
  - htpasswd:
      fileData:
        name: htpass-idp-ex280
    mappingMethod: claim
    name: htpass-ex280
    type: HTPasswd
  tokenConfig:
   accessTokenMaxAgeSeconds: 31536000
